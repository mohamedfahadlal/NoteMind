<!DOCTYPE html>
<html>

<head>
    <title>Search Notes</title>
</head>

<body>

<h2>Search Notes</h2>

<form method="GET">

    <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search..."
        required
    >

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% if notes %}

    {% for note in notes %}

        <h3>{{ note.title }}</h3>

        <p>{{ note.file_name }}</p>

        <a href="/note/{{ note.id }}">
            Open
        </a>

        <hr>

    {% endfor %}

{% elif query %}

    <p>No matching notes found.</p>

{% endif %}

</body>
</html>
