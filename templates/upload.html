<!DOCTYPE html>
<html>

<head>
    <title>Upload Note</title>
</head>

<body>

<h2>Upload Note</h2>

<form
    method="POST"
    enctype="multipart/form-data"
>

    <input
        type="text"
        name="title"
        placeholder="Note Title"
        required
    >

    <br><br>

    <input
        type="file"
        name="file"
        required
    >

    <br><br>

    <button type="submit">
        Upload
    </button>

</form>

</body>
</html>
